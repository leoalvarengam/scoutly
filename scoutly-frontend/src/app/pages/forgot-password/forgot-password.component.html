<div class="auth-container">
  <div class="auth-card">
    <div class="brand">
      <img src="/logoScoutly.webp" alt="Scoutly" />
      <h1>Recuperação de Senha</h1>
    </div>

    <div *ngIf="successMessage" class="success-alert">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <form
      *ngIf="!successMessage"
      [formGroup]="forgotForm"
      (ngSubmit)="onSubmit()"
      class="auth-form"
    >
      <p class="instruction-text">
        Digite o e-mail associado à sua conta e enviaremos um link para criar
        uma nova senha.
      </p>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="seu@email.com"
          autofocus
        />
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="forgotForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">Enviar link de recuperação</span>
        <span *ngIf="isLoading">Enviando...</span>
      </button>
    </form>

    <div class="auth-links">
      <p>Lembrou sua senha? <a routerLink="/login">Voltar para o Login</a></p>
    </div>
  </div>
</div>
