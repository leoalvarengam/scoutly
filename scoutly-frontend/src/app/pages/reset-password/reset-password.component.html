<div class="auth-container">
  <div class="auth-card">
    <div class="brand">
      <img src="/logoScoutly.webp" alt="Scoutly" />
      <h1>Criar Nova Senha</h1>
    </div>

    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <form
      *ngIf="token && !errorMessage"
      [formGroup]="resetForm"
      (ngSubmit)="onSubmit()"
      class="auth-form"
    >
      <div class="form-group">
        <label for="newPassword">Nova Senha</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="newPassword"
            formControlName="newPassword"
            placeholder="Mínimo 6 caracteres"
            autofocus
          />
          <button
            type="button"
            class="toggle-password-btn"
            (click)="togglePassword()"
            tabindex="-1"
          >
            <svg
              *ngIf="showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg
              *ngIf="!showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
              <path
                d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
              />
              <path
                d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"
              />
              <line x1="2" x2="22" y1="2" y2="22" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Nova Senha</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Repita a senha"
        />
        <small
          class="field-error"
          *ngIf="
            resetForm.errors?.['mismatch'] &&
            resetForm.get('confirmPassword')?.touched
          "
        >
          As senhas não coincidem.
        </small>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="resetForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">Salvar Nova Senha</span>
        <span *ngIf="isLoading">Salvando...</span>
      </button>
    </form>

    <div class="auth-links">
      <p><a routerLink="/login">Voltar para o Login</a></p>
    </div>
  </div>
</div>
