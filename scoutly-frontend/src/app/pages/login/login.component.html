<div class="login-wrapper">
  <div class="login-card">
    <div class="brand-header">
      <img src="/logoScoutly.webp" alt="Scoutly" />
      <h1>Entrar</h1>
      <p>Faça login para acessar seu painel e acompanhar os alertas.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" formControlName="email" placeholder="seu@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" formControlName="password" placeholder="••••••••" />
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid">
        Entrar na Conta
      </button>
    </form>

    <div class="back-link">
      <a routerLink="/">Voltar para o início</a>

      <div class="register-text">
        <span>Não tem conta?</span>
        <a class="link-action" routerLink="/register">Crie aqui</a>
      </div>
    </div>
  </div>
</div>
