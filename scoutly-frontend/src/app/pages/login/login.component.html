<div class="login-wrapper">
  <div class="login-card">
    <div class="brand-header">
      <img src="/logoScoutly.webp" alt="Scoutly" />
      <h1>Entrar</h1>
      <p>Faça login para acessar seu painel e acompanhar os alertas.</p>
    </div>

    <form class="auth-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" disabled />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" disabled />
      </div>
      <button type="button" class="btn-submit" disabled>Entrar na Conta</button>
    </form>

    <div class="back-link">
      <a routerLink="/">Voltar para o início</a>
    </div>
  </div>
</div>
