<div class="login-wrapper">
  <div class="login-card">
    <div class="brand-header">
      <img src="/logoScoutly.webp" alt="Scoutly" />
      <h1>Entrar</h1>
      <p>Faça login para acessar seu painel e acompanhar os alertas.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="seu@email.com"
          autofocus
        />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            placeholder="••••••••"
          />

          <button
            type="button"
            class="toggle-password-btn"
            (click)="togglePassword()"
            tabindex="-1"
            aria-label="Mostrar ou ocultar senha"
          >
            <svg
              *ngIf="showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>

            <svg
              *ngIf="!showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
              <path
                d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
              />
              <path
                d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"
              />
              <line x1="2" x2="22" y1="2" y2="22" />
            </svg>
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="loginForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">Entrar na Conta</span>
        <span *ngIf="isLoading">Entrando...</span>
      </button>
    </form>

    <div *ngIf="successMessage" class="success-alert">
      {{ successMessage }}
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="back-link">
      <a routerLink="/">Voltar para o início</a>

      <div class="register-text">
        <span>Não tem conta?</span>
        <a class="link-action" routerLink="/register">Crie aqui</a>
      </div>
    </div>
  </div>
</div>
